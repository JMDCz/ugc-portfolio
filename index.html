<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Marc Dela Cruz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1612;
      --rust: #b85c38;
      --muted: #8a7f74;
      --line: rgba(26,22,18,0.12);
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'Geist Mono', monospace;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    .container {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(2rem, 6vw, 5rem);
    }

    /* Top horizontal rule */
    .rule-top {
      position: absolute;
      top: clamp(2rem, 6vw, 5rem);
      left: clamp(2rem, 6vw, 5rem);
      right: clamp(2rem, 6vw, 5rem);
      height: 1px;
      background: var(--line);
      transform-origin: left;
      animation: expand 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2.5rem;
      padding-top: 4rem;
    }

    .eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: clamp(0.65rem, 1.2vw, 0.75rem);
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rust);
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 9rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--rust);
    }

    .status-block {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.85s forwards;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--rust);
      animation: pulse 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .status-text {
      font-size: clamp(0.7rem, 1.3vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* Bottom bar */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-top: 1px solid var(--line);
      padding-top: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .footer-domain {
      font-size: clamp(0.65rem, 1vw, 0.72rem);
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: lowercase;
    }

    .footer-year {
      font-size: clamp(0.65rem, 1vw, 0.72rem);
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* Decorative vertical line */
    .v-rule {
      position: absolute;
      right: clamp(2rem, 6vw, 5rem);
      top: clamp(2rem, 6vw, 5rem);
      bottom: clamp(2rem, 6vw, 5rem);
      width: 1px;
      background: var(--line);
      transform-origin: top;
      animation: expandV 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    /* Small label on vertical rule */
    .v-label {
      position: absolute;
      right: calc(clamp(2rem, 6vw, 5rem) + 16px);
      top: 50%;
      transform: translateY(-50%) rotate(180deg);
      writing-mode: vertical-rl;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s ease 1.3s forwards;
    }

    @keyframes expand {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @keyframes expandV {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="rule-top"></div>
  <div class="v-rule"></div>
  <span class="v-label">Under Construction</span>

  <div class="container">
    <div class="main">
      <p class="eyebrow">Coming Soon</p>
      <h1>John Marc<br /><em>Dela Cruz</em></h1>
      <div class="status-block">
        <div class="dot"></div>
        <p class="status-text">Something is being built here — check back soon.</p>
      </div>
    </div>

    <footer class="footer">
      <span class="footer-domain">johnmarcdelacruz.com</span>
      <span class="footer-year">© 2026</span>
    </footer>
  </div>
</body>
</html>
